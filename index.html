<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Protocol">
<meta name="theme-color" content="#0E1320">
<title>The Hollywood Protocol · Companion v6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
  --paper:#F4F6F9; --ptxt:#0E1320;
  --txt:#EFF3F8; --mut:#93A0B5;
  --acc:#3B82FF; --accso:rgba(59,130,255,.16); --accbr:rgba(59,130,255,.5);
  --ok:#41D6A8; --warn:#FFA94D; --bad:#FF5C5C;
  --surf:rgba(255,255,255,.05); --surf2:rgba(255,255,255,.085);
  --glassbg:rgba(21,28,42,.55); --hair:rgba(160,180,210,.12);
  --blur:blur(16px) saturate(1.3);
  --sh1:inset 0 1px 0 rgba(255,255,255,.05), 0 10px 30px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.25);
  --sh2:inset 0 1px 0 rgba(255,255,255,.07), 0 18px 44px rgba(0,0,0,.45), 0 4px 12px rgba(0,0,0,.3);
  --shacc:0 10px 26px rgba(59,130,255,.35), 0 2px 8px rgba(0,0,0,.3);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --easeo:cubic-bezier(.22,1,.36,1);
  --disp:'Inter',-apple-system,'SF Pro Display','Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior-y:none}
body{color:var(--txt);font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;min-height:100vh;
 background:#0C1018;background-image:radial-gradient(120% 55% at 50% -8%,rgba(59,130,255,.13),transparent 60%),linear-gradient(180deg,#161E2D 0%,#0F1522 45%,#0B0F18 100%);background-attachment:fixed}
button{font:inherit;background:none;border:none;color:inherit;cursor:pointer;touch-action:manipulation}
.mono{font-family:var(--mono);font-size:11.5px;letter-spacing:1px;text-transform:uppercase}
.disp{font-family:var(--disp);font-weight:800;letter-spacing:-.02em}
::view-transition-old(root),::view-transition-new(root){animation-duration:.28s;animation-timing-function:var(--easeo)}
/* — tacte orgànic — */
.btn,.fx,.fnav,.frirrow button,.chip.tap,.oline,.pbtn,.undochip,nav.tabs button,.acc2>button,.stat,.witem{transition:transform .45s var(--spring),filter .25s ease,background .25s ease,box-shadow .3s ease}
.btn:active,.fx:active,.fnav:active,.frirrow button:active,.chip.tap:active,.oline:active,.pbtn:active,.undochip:active,nav.tabs button:active,.acc2>button:active{transform:scale(.96);filter:brightness(1.25)}
.glass{background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--sh1)}
.wrap{max-width:520px;margin:0 auto;padding:0 18px 128px;position:relative;z-index:1}
header.top{display:flex;align-items:flex-end;justify-content:space-between;padding:calc(18px + env(safe-area-inset-top)) 2px 14px}
.card{background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:22px;padding:22px;margin-bottom:16px;box-shadow:var(--sh1)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border-radius:16px;padding:17px;font-family:var(--mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;min-height:54px}
.btn-acc{background:var(--acc);color:#fff;box-shadow:var(--shacc)}
.btn-ink{background:rgba(10,15,26,.85);color:var(--acc);box-shadow:var(--sh1)}
.btn-ghost{border:1.5px dashed rgba(110,125,150,.45);color:#5d6b80;font-size:12px;letter-spacing:1px}
.btn-line{background:var(--surf);color:var(--mut);font-size:12px;letter-spacing:1px;box-shadow:var(--sh1)}
.btn-soft{background:var(--accso);color:var(--txt);font-size:12px;letter-spacing:1px;margin-top:10px;box-shadow:var(--sh1)}
.btn[disabled]{background:var(--surf);color:var(--mut);box-shadow:none}
.coach{border-left:3px solid var(--acc)}
.coach .cm{font-size:13.5px;margin-top:9px;line-height:1.55}
.coach .cm.warn{color:var(--warn)}.coach .cm.red{color:var(--bad)}.coach .cm.sage{color:var(--ok)}.coach .cm.hold{color:var(--txt)}
.strip{background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:22px;padding:12px;margin-bottom:16px;box-shadow:var(--sh1)}
.sprk{display:flex;justify-content:space-between;padding:0 4px}
.sprk i{width:5px;height:5px;border-radius:2px;background:rgba(160,180,210,.18)}
.frames{display:flex;gap:5px;margin:8px 0}
.frame{flex:1;height:48px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surf);border-radius:10px;font-family:var(--mono)}
.frame b{font-size:13px;color:var(--mut);font-weight:600}
.frame small{font-size:8.5px;color:var(--mut)}
.frame.done{background:var(--surf2)}.frame.done b{color:var(--acc)}
.frame.cur{background:var(--paper);box-shadow:var(--sh2)}
.frame.cur b,.frame.cur small{color:var(--ptxt)}
.frame.rest{opacity:.55}.frame.rest.cur{opacity:1}
.sheet{background:var(--paper);color:var(--ptxt);border-radius:26px;overflow:hidden;margin-bottom:16px;animation:rise .5s var(--spring) both;box-shadow:var(--sh2)}
.sheet .bar{display:flex;justify-content:space-between;background:var(--ptxt);padding:11px 20px}
.sheet .bar .mono{color:var(--paper)}.sheet .bar .mono.a{color:#7db1ff}
.sheet .body{padding:24px;display:flex;gap:12px}
.sheet h1{font-family:var(--disp);font-size:36px;line-height:1.05;font-weight:800;letter-spacing:-1px}
.sheet .sub{color:#3c4654;font-size:14.5px;margin-top:8px;line-height:1.5}
.sheet .meta{display:flex;gap:14px;margin-top:12px;font-family:var(--mono);font-size:11px;color:#67748a;flex-wrap:wrap}
.sheet .eyebrow{color:#67748a}
.calm{background:#e7ecf4;color:#3c4654;border-radius:14px;padding:14px;font-size:13.5px;margin-top:10px;line-height:1.5}
.anat{flex-shrink:0;display:flex;gap:2px;align-items:center}
.anat svg{display:block}
.anat .bod{fill:#d8dfe9;stroke:#b3bfd0;stroke-width:.8}
.anat .mus{fill:#c7d1df;opacity:.5;transition:opacity .3s}
.anat .mus.on{fill:var(--acc);opacity:.95;filter:drop-shadow(0 0 3px rgba(59,130,255,.7))}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.stat{background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:20px;padding:18px 10px;text-align:center;box-shadow:var(--sh1)}
.stat b{font-family:var(--mono);font-size:24px;font-weight:600;display:block}
.stat span{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}
/* ===== FOCUS ===== */
.focus{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;background:inherit;background-color:#0C1018;background-image:radial-gradient(120% 55% at 50% -8%,rgba(59,130,255,.13),transparent 60%),linear-gradient(180deg,#161E2D 0%,#0F1522 45%,#0B0F18 100%);animation:fadein .2s ease-out both}
.fhead{display:flex;align-items:center;gap:12px;padding:calc(12px + env(safe-area-inset-top)) 18px 10px}
.fhead .fx{width:50px;height:50px;display:flex;align-items:center;justify-content:center;font-size:21px;color:var(--mut);border-radius:16px;background:var(--surf);box-shadow:var(--sh1)}
.fprog{flex:1}
.fprog .ft{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);text-align:center}
.fbar{height:5px;background:var(--surf);border-radius:3px;margin-top:7px;overflow:hidden}
.fbar i{display:block;height:100%;background:var(--acc);border-radius:3px;transition:width .5s var(--easeo)}
.fbody{flex:1;overflow-y:auto;padding:8px 20px 16px;display:flex;flex-direction:column}
.fexrow{display:flex;gap:14px;align-items:center}
.fexname{font-size:21px;font-weight:800;line-height:1.3;flex:1;letter-spacing:-.3px}
.fig{flex-shrink:0;width:98px;height:98px;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:24px;box-shadow:var(--sh1)}
.fig svg{display:block}
.fig .bone{stroke:var(--paper);stroke-width:4;stroke-linecap:round;fill:none}
.fig .bhead{fill:var(--paper)}
.fig .prop{stroke:#42597f;stroke-width:3;stroke-linecap:round}
.fdo{margin-top:14px;background:rgba(10,15,26,.8);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:16px;padding:14px 16px;font-size:15px;color:#7db1ff;display:flex;gap:10px;align-items:baseline;font-weight:600;box-shadow:var(--sh1)}
.fdo .mono{font-size:9.5px;color:var(--mut);flex-shrink:0;font-weight:400}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{font-family:var(--mono);font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;background:var(--surf);border-radius:11px;padding:9px 13px;color:var(--mut);min-height:36px;display:flex;align-items:center}
.chip.tap{color:#7db1ff;background:var(--accso)}
.fset{margin-top:16px;text-align:center}
.fset .sl{font-family:var(--mono);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--txt)}
.fset .side{color:#7db1ff;font-weight:700}
.fset .edited{display:block;margin-top:7px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--ok);text-transform:uppercase}
.undochip{margin-left:8px;background:var(--surf);border-radius:9px;padding:6px 11px;font-family:var(--mono);font-size:10px;color:var(--warn);text-transform:uppercase;letter-spacing:.5px}
/* onada */
.wave{position:relative;margin:14px -4px 0;height:192px}
.wave svg{display:block;width:100%;height:160px}
.wave .wpath{fill:none;stroke:rgba(59,130,255,.32);stroke-width:3.5}
.wave .wball{fill:var(--acc);filter:drop-shadow(0 0 8px rgba(59,130,255,.9))}
.wave .wlane{stroke:var(--hair);stroke-width:1;stroke-dasharray:3 6}
.wave.glow .wball{fill:#8fc0ff;filter:drop-shadow(0 0 14px rgba(143,192,255,1))}
.wcount{position:absolute;top:0;right:8px;font-family:var(--mono);font-size:46px;font-weight:600;line-height:1;color:var(--paper);text-align:right}
.wcount small{font-size:11px;font-weight:400;color:var(--mut);letter-spacing:1px;display:block;margin-top:3px}
.wph{position:absolute;top:6px;left:8px;font-family:var(--mono);font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--mut)}
.wave.glow .wph{color:#8fc0ff}
.wave.run .wph{color:var(--acc)}
.pbtn{margin:4px auto 0;display:block;background:var(--accso);color:#7db1ff;border-radius:16px;padding:15px 28px;font-family:var(--mono);font-size:12.5px;letter-spacing:2px;text-transform:uppercase;min-height:54px;box-shadow:var(--sh1)}
/* rodes */
.fwheels{display:flex;gap:14px;justify-content:center;margin-top:18px}
.wcol{flex:1;max-width:164px}
.wlab{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);text-align:center;margin-bottom:8px}
.wbox{position:relative;height:168px;border-radius:20px;overflow:hidden;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--sh1)}
.wheel{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-mask-image:linear-gradient(transparent,#000 32%,#000 68%,transparent);mask-image:linear-gradient(transparent,#000 32%,#000 68%,transparent)}
.wheel::-webkit-scrollbar{display:none}
.witem{height:56px;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;font-family:var(--mono);font-size:26px;color:var(--mut)}
.wpad{height:56px}
.wsel{position:absolute;left:12px;right:12px;top:56px;height:56px;border-top:1.5px solid var(--accbr);border-bottom:1.5px solid var(--accbr);pointer-events:none;border-radius:2px}
/* RIR */
.frir{margin-top:18px}
.frir .rl{font-family:var(--mono);font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);text-align:center;margin-bottom:10px;line-height:1.6}
.frirrow{display:flex;gap:10px}
.frirrow button{flex:1;height:68px;border-radius:18px;background:var(--surf2);font-family:var(--mono);font-size:19px;font-weight:600;color:var(--txt);box-shadow:var(--sh1)}
.frirrow button:active{background:var(--acc);color:#fff}
.frirrow small{display:block;font-size:9px;color:var(--mut);font-weight:400;letter-spacing:.5px}
.ffoot{display:flex;gap:10px;padding:10px 18px calc(14px + env(safe-area-inset-bottom))}
.fnav{flex:1;height:56px;border-radius:16px;background:var(--surf);color:var(--mut);font-family:var(--mono);font-size:12px;letter-spacing:1px;text-transform:uppercase;box-shadow:var(--sh1)}
/* descans */
.restwrap{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(9,13,21,.82);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);animation:fadein .2s both;padding:22px}
.rring{position:relative;width:252px;height:252px}
.rring svg{transform:rotate(-90deg)}
.rring-bg{fill:none;stroke:rgba(255,255,255,.08);stroke-width:10}
.rring-fg{fill:none;stroke:var(--acc);stroke-width:10;stroke-linecap:round}
.rnum{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rnum b{font-family:var(--mono);font-size:62px;line-height:1;font-weight:600;color:var(--paper)}
.rnum span{font-family:var(--mono);font-size:10.5px;letter-spacing:3px;text-transform:uppercase;color:var(--mut);margin-top:7px}
.rnext{margin-top:24px;text-align:center}
.rnext .nl{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
.rnext .nv{font-size:18px;font-weight:700;color:#7db1ff;margin-top:6px;max-width:320px;letter-spacing:-.2px}
.rbtns{display:flex;gap:10px;margin-top:28px;width:100%;max-width:380px}
.restwrap.fi .rnum b{color:var(--acc)}
/* overlays */
.over{position:fixed;inset:0;z-index:50;background:rgba(6,9,15,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;animation:fadein .15s both}
.osheet{width:100%;max-height:78vh;overflow-y:auto;border-radius:26px 26px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));box-shadow:var(--sh2)}
.oline{display:flex;align-items:center;gap:12px;padding:15px 6px;border-bottom:1px solid var(--hair);min-height:56px;border-radius:10px}
.oline .n{flex:1;font-size:15px}
.oline .st{font-family:var(--mono);font-size:11px;color:var(--mut)}
.oline.cur .n{color:#7db1ff;font-weight:700}
.plrow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:14px;padding:12px 4px;border-bottom:1px solid var(--hair)}
.sumwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;animation:rise .5s var(--spring) both}
.stamp{border:1.5px solid var(--accbr);color:#7db1ff;border-radius:18px;padding:14px;display:flex;gap:12px;align-items:center;text-align:left;margin-top:10px;animation:stamp .45s var(--spring) both;background:var(--accso);box-shadow:var(--sh1)}
select.sel{width:100%;background:var(--glassbg);color:var(--txt);border:none;border-radius:16px;padding:16px;font-family:var(--mono);font-size:13px;margin-bottom:14px;min-height:52px;box-shadow:var(--sh1)}
.hrow{display:flex;gap:10px;align-items:center;background:var(--surf);border-radius:14px;padding:13px;margin-bottom:8px}
.hrow .d{font-family:var(--mono);font-size:11px;color:var(--mut);width:40px}
.hrow .s{font-family:var(--mono);font-size:12px;flex:1}
.acc-c{color:#7db1ff}
.acc2{background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:22px;margin-bottom:12px;overflow:hidden;box-shadow:var(--sh1)}
.acc2>button{width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px;text-align:left;min-height:58px}
.acc2 .ti{font-family:var(--disp);font-size:17px;font-weight:700;color:var(--paper);letter-spacing:-.2px}
.acc2 .fo{display:block;font-family:var(--mono);font-size:9.5px;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-top:3px}
.accbody{padding:0 18px 16px}
.exline{padding:10px 0;border-top:1px solid var(--hair);font-size:13px}
.exline .r1{display:flex;gap:8px}
.exline .n{flex:1}
.exline .t{font-family:var(--mono);font-size:10.5px;color:var(--mut)}
.exline .tech{margin-top:5px;font-size:12px;color:var(--mut);line-height:1.55}
ol.rules{padding-left:18px;margin-top:10px;font-size:13.5px;display:grid;gap:9px;line-height:1.5}
.tech{font-size:13px;color:var(--mut);margin-top:10px;line-height:1.6}
.sug{margin-top:8px;font-size:13px;line-height:1.5}
.sug.up{color:var(--ok)}.sug.warn{color:var(--warn)}.sug.down{color:var(--bad)}.sug.hold,.sug.info{color:var(--mut)}
.last{font-family:var(--mono);font-size:10.5px;color:var(--mut);margin-top:9px;letter-spacing:.5px}
nav.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 -10px 30px rgba(0,0,0,.4);padding-bottom:env(safe-area-inset-bottom);z-index:16}
nav.tabs button{flex:1;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);min-height:56px}
nav.tabs button.on{color:var(--acc)}
nav.tabs .ic{font-size:17px;line-height:1}
.mut{color:var(--mut)}.ok{color:var(--ok)}
.empty{color:var(--mut);font-size:13px;text-align:center;padding:36px 12px}
/* v7: anell setmanal, PR, ajustos, onboarding */
.wring{position:relative;width:56px;height:56px;margin:0 auto 6px}
.wring svg{transform:rotate(-90deg)}
.wring-bg{fill:none;stroke:rgba(255,255,255,.09);stroke-width:5}
.wring-fg{fill:none;stroke:var(--acc);stroke-width:5;stroke-linecap:round}
.wring b{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;font-weight:600}
.fig-s{width:86px;height:86px;margin:12px auto 2px;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:22px;box-shadow:var(--sh1)}
.fig-s .bone{stroke:var(--paper);stroke-width:4;stroke-linecap:round;fill:none}
.fig-s .bhead{fill:var(--paper)}
.fig-s .prop{stroke:#42597f;stroke-width:3;stroke-linecap:round}
.prbadge{font-family:var(--mono);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#FFD66B;background:rgba(255,193,77,.14);padding:11px 18px;border-radius:14px;margin-bottom:16px;box-shadow:var(--sh1);animation:stamp .45s var(--spring) both}
.srow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 4px;border-bottom:1px solid var(--hair);font-size:14.5px;min-height:58px}
.sw{width:50px;height:30px;border-radius:15px;background:rgba(255,255,255,.14);position:relative;transition:background .25s;flex-shrink:0}
.sw i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:12px;background:#fff;transition:transform .4s var(--spring);box-shadow:0 2px 6px rgba(0,0,0,.35)}
.sw.on{background:var(--acc)}
.sw.on i{transform:translateX(20px)}
nav.tabs .ic{display:flex;align-items:center;justify-content:center;height:20px}
nav.tabs button.on .ic{transform:scale(1.12);transition:transform .4s var(--spring)}
.obdot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.18)}
.obdot.on{background:var(--acc)}
/* —— Mòdul 1: jerarquia visual de l'entreno —— */
.hero{display:flex;gap:16px;align-items:center;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:26px;padding:18px;margin-top:6px;box-shadow:var(--sh1)}
.fig-h{width:128px;height:128px;border-radius:26px;flex-shrink:0}
.hcol{flex:1;min-width:0}
.heyebrow{font-family:var(--mono);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--mut)}
.hname{font-size:21px;font-weight:800;line-height:1.25;letter-spacing:-.4px;margin-top:6px}

.fdo-mini .mono{font-size:8.5px}
.bigstats{display:flex;gap:12px;margin-top:14px}
.bstat{flex:1;background:var(--glassbg);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:22px;padding:16px 12px;text-align:center;box-shadow:var(--sh1)}

.bstat .bv{font-family:var(--mono);font-size:40px;font-weight:600;line-height:1;margin-top:8px;color:var(--paper)}
.bstat .bv small{font-size:15px;color:var(--mut);font-weight:400}
.sidepill{margin-top:12px;background:var(--accso);color:#8fc0ff;border-radius:14px;padding:13px;text-align:center;font-weight:700;font-size:15px;letter-spacing:.3px;box-shadow:var(--sh1)}
.chips-c{justify-content:center;margin-top:14px}
.rise{animation:rise .5s var(--spring) both}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:none}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
@keyframes stamp{from{opacity:0;transform:scale(1.18) rotate(-2deg)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

function parseTempo(t){t=(t||"").toLowerCase();if(t.indexOf("isom")>=0)return{iso:1};const m=t.match(/(\d+)\s*-\s*(\d+)\s*-\s*(\d+)/);if(m)return{e:+m[1],p:+m[2],c:+m[3]};if(t.indexOf("ecc")>=0)return{e:3,p:0,c:1};if(t==="lent")return{e:2,p:0,c:2};return{e:2,p:0,c:1}}
const sm=t=>t*t*(3-2*t);
function phaseAt(tp,tl){
 const E=tp.e,Pp=tp.p,C=Math.max(tp.c,.8);
 if(tl<E)return{name:"ecc",t:sm(tl/E),left:E-tl};
 if(tl<E+Pp)return{name:"pause",t:1,left:E+Pp-tl};
 return{name:"conc",t:sm(1-((tl-E-Pp)/C)),left:0};
}
const cycLen=tp=>tp.iso?1:tp.e+tp.p+Math.max(tp.c,.8);

let P=null,Fraf=0,figT0=0;
const WV={W:340,H:160,T:34,B:124,CW:230,BX:170};
function waveYAt(tp,tl){if(tp.iso)return (WV.T+WV.B)/2;const ph=phaseAt(tp,tl);return WV.T+(WV.B-WV.T)*ph.t}
function wavePath(tp){
 const cyc=cycLen(tp);let d="";
 for(let c=0;c<4;c++){
  for(let x=0;x<=WV.CW;x+=4){
   const tl=(x/WV.CW)*cyc;const X=c*WV.CW+x;const Y=waveYAt(tp,tl);
   d+=(d?" L":"M")+X.toFixed(1)+","+Y.toFixed(1);
  }
 }
 return d;
}

function loggedSets(d){return d.sets.filter(s=>s.r>0&&s.rir!=null).map(s=>({r:s.r,k:s.k,rir:s.rir}))}
function evalExercise(ex,sets){
 if(ex.prog==="none"||!sets.length)return null;
 const top=sets.every(s=>s.r>=ex.rep[1]);
 const easy=sets.every(s=>s.rir!=null&&s.rir>=3);
 const low=sets.some(s=>s.r<ex.rep[0]);
 if(ex.prog==="pullup"){
  if(top&&sets.length>=4)return{code:"level",up:true};
  if(top&&sets.length===3)return{code:"addset",up:false};
 }else if(top&&sets.length>=ex.sets)return{code:easy?"levelBig":"level",up:true};
 if(low)return{code:"down",up:false};
 if(easy)return{code:"easy",up:false};
 return{code:"hold",up:false};
}
function applyKg(v){

}

function svgChart(rows){
 if(rows.length<2)return '<div class="empty">Registra aquest exercici un parell de cops i aquí veuràs la corba de progrés.</div>';
 const W=340,H=160,Pd=26;
 const mk=Math.max.apply(null,rows.map(r=>r.kg).concat([1]));
 const mr=Math.max.apply(null,rows.map(r=>r.reps).concat([1]));
 const X=i=>Pd+i*(W-2*Pd)/(rows.length-1);
 const Yk=v=>H-Pd-(v/mk)*(H-2*Pd), Yr=v=>H-Pd-(v/mr)*(H-2*Pd);
 const pk=rows.map((r,i)=>X(i)+","+Yk(r.kg)).join(" ");
 const pr=rows.map((r,i)=>X(i)+","+Yr(r.reps)).join(" ");
 const dots=rows.map((r,i)=>'<circle cx="'+X(i)+'" cy="'+Yk(r.kg)+'" r="3" fill="#3B82FF"/>'+(r.up?'<text x="'+X(i)+'" y="'+(Yk(r.kg)-7)+'" font-size="9" text-anchor="middle" fill="#3B82FF">★</text>':'')).join("");
 return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto">'
  +'<line x1="'+Pd+'" y1="'+(H-Pd)+'" x2="'+(W-Pd)+'" y2="'+(H-Pd)+'" stroke="rgba(160,180,210,.18)"/>'
  +'<polyline points="'+pr+'" fill="none" stroke="#F4F6F9" stroke-width="1.4" stroke-dasharray="4 3" opacity=".8"/>'
  +'<polyline points="'+pk+'" fill="none" stroke="#3B82FF" stroke-width="2"/>'+dots
  +'<text x="'+Pd+'" y="12" font-size="9" fill="#93A0B5" font-family="monospace">màx '+mk+' kg · '+mr+' reps tot.</text>'
  +'<text x="'+Pd+'" y="'+(H-8)+'" font-size="9" fill="#93A0B5" font-family="monospace">'+rows[0].d+'</text>'
  +'<text x="'+(W-Pd)+'" y="'+(H-8)+'" font-size="9" fill="#93A0B5" font-family="monospace" text-anchor="end">'+rows[rows.length-1].d+'</text></svg>'
  +'<div style="display:flex;gap:14px;justify-content:center"><span class="mono" style="font-size:9px;color:var(--acc)">— kg màx</span><span class="mono" style="font-size:9px;color:var(--paper)">┄ reps totals</span></div>';
}

  else{UI.exitArm=1;render();setTimeout(function(){if(UI.exitArm){UI.exitArm=0;render()}},3000)}
 }
 else if(a==="list"){UI.over="list";render()}
 else if(a==="plates"){UI.over="plates";render()}
 else if(a==="closeover"){UI.over=null;render()}
 else if(a==="settings"){UI.over="set";render()}
 else if(a==="togglesound"){if(!D.set)D.set={sound:1};D.set.sound=D.set.sound?0:1;save();render()}
 else if(a==="cycleprep"){if(!D.set)D.set={sound:1};const pp=D.set.prep||6;D.set.prep=pp>=7?5:pp+1;save();render()}
 else if(a==="replayonb"){UI.onb=0;UI.over="onb";render()}

 else if(a==="onbskip"){D.onboarded=1;save();UI.onb=0;UI.over=null;render()}
 else if(a==="jump"){UI.over=null;gotoPos({ei:+t.dataset.i,si:0})}
 else if(a==="info"){UI.workout.info=!UI.workout.info;render()}
 else if(a==="pacer"){if(P)pacerStop(true);else pacerStart()}
 else if(a==="rir"){ensureAudio();commitSet(+t.dataset.r)}
 else if(a==="clearset")clearSet();
 else if(a==="prev")navStep(-1);
 else if(a==="next")navStep(1);
 else if(a==="addset"){const d=curDraft();d.sets.push({r:d.sets[d.sets.length-1].r,k:d.sets[d.sets.length-1].k,rir:null});delete UI.workout.verdicts[curEx().id];saveDraft();render()}

function makeIcon(size){
 const c=document.createElement("canvas");c.width=c.height=size;const x=c.getContext("2d");
 const u=size/512;
 x.fillStyle="#0E1320";x.fillRect(0,0,size,size);
 x.fillStyle="#3B82FF";
 x.beginPath();x.roundRect(86*u,150*u,340*u,260*u,40*u);x.fill();
 x.save();x.translate(86*u,108*u);
 x.beginPath();x.roundRect(0,0,340*u,52*u,18*u);x.fill();
 x.fillStyle="#0E1320";
 for(let i=0;i<5;i++){x.save();x.translate((28+i*68)*u,6*u);x.rotate(.42);x.fillRect(0,0,22*u,52*u);x.restore()}
 x.restore();
 x.fillStyle="#F4F6F9";x.font="800 "+Math.round(150*u)+"px Inter, Arial";x.textAlign="center";x.textBaseline="middle";
 x.fillText("HP",size/2,300*u);
 return c.toDataURL("image/png");
}
